name: Flutter Planning CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  planning:
    name: Analyze and test Planning
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Flutter version
        run: flutter --version

      - name: Install dependencies
        run: flutter pub get

      - name: Verify generated ObjectBox sources
        run: |
          test -f lib/objectbox.g.dart
          echo "ObjectBox generated source is present."

      - name: Analyze Planning feature
        run: |
          flutter analyze lib/features/planning test/features/planning

      - name: Run Planning tests
        run: |
          flutter test test/features/planning --reporter expanded

      - name: Run all tests
        run: |
          flutter test --reporter expanded
