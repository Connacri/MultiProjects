name: Planning CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  planning-quality:
    name: Planning quality gate
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          flutter-version: '3.44.0'
          cache: true

      - name: Show toolchain
        run: |
          flutter --version
          dart --version

      - name: Install dependencies
        run: flutter pub get

      - name: Verify ObjectBox generation contract
        run: dart run tool/check_objectbox_build_runner.dart

      - name: Verify ObjectBox generated code contract
        run: dart run tool/check_objectbox_generation_contract.dart

      - name: Verify formatting
        run: dart format --output=none --set-exit-if-changed lib test tool

      - name: Analyze
        run: flutter analyze

      - name: Run Planning tests
        run: flutter test test/features/planning --reporter expanded

      - name: Run full test suite
        run: flutter test --reporter expanded
