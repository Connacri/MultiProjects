flutter_icons:
  android: true
  ios: true
  image_path: "assets/icon/icon.png"
  #  image_path: "assets/images/ic_launcher/1024.png"
  min_sdk_android: 21 # android min sdk min:16, default 21
  web:
    generate: true
    image_path: "assets/images/ic_launcher/icon.png"
    #    image_path: "assets/images/ic_launcher/1024.png"
    adaptive_icon_foreground: "assets/images/ic_launcher/icon.png"
    background_color: "#hexcode"
    theme_color: "#hexcode"
  windows:
    generate: true
    image_path: "assets/images/ic_launcher/icon.png"
    icon_size: 48 # min:48, max:256, default: 48
  macos:
    generate: true
    image_path: "assets/images/ic_launcher/icon.png"

flutter_native_splash:
  # Configuration Android
  android: true
  background_image: assets/icon/splash3.png
  android_12:
    image: assets/icon/splash3.png
    icon_background_color: "#2C2C2C"


  # Configuration iOS
  ios: true
  image: assets/icon/splash3.png
  color: "#2C2C2C"

flutter:

  uses-material-design: true



  fonts:
    - family: Oswald
      fonts:
        - asset: assets/fonts/Oswald-Bold.ttf
        - asset: assets/fonts/Oswald-ExtraLight.ttf
        - asset: assets/fonts/Oswald-SemiBold.ttf
        - asset: assets/fonts/Oswald-Regular.ttf
        - asset: assets/fonts/Oswald-Light.ttf
        - asset: assets/fonts/Oswald-Medium.ttf
    - family: ArbFONTS
      fonts:
        - asset: assets/fonts/ArbFONTS-khalaad-al-arabeh.ttf
        - asset: assets/fonts/ArbFONTS-Al-Jazeera-Arabic-Bold.ttf
        - asset: assets/fonts/ArbFONTS-Al-Jazeera-Arabic-Bold-1.ttf
        - asset: assets/fonts/ArbFONTS-Al-Jazeera-Arabic-Light.ttf
        - asset: assets/fonts/ArbFONTS-Al-Jazeera-Arabic-Regular.ttf
        - asset: assets/fonts/NizarBBCKurdish-Bold.ttf

  assets:
    - assets/
    - assets/lotties/
