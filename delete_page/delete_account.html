<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>Suppression de compte</title>
    <meta content="width=device-width, initial-scale=1.0" name="viewport">
    <!-- Chargement des SDK nécessaires dans le bon ordre -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.0/firebase-auth-compat.js"></script>
    <style>
        body { font-family: sans-serif; max-width: 600px; margin: auto; padding: 20px; }
        button {
            display: block;
            width: 100%;
            margin: 10px 0;
            padding: 12px;
            background: #4285F4;
            color: white;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            font-size: 16px;
        }
        button:hover { background: #3367D6; }
        button:disabled {
            background: #9E9E9E;
            cursor: not-allowed;
        }
        h1, h2 { color: #333; }
        .notice {
            background: #f8f9fa;
            padding: 15px;
            margin-bottom: 20px;
            border-left: 4px solid #fbbc05;
        }
        .google-btn {
            background: #4285F4;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .google-icon {
            background: white;
            padding: 8px;
            border-radius: 2px;
            margin-right: 12px;
        }
        #userInfo {
            display: none;
            margin: 20px 0;
            padding: 15px;
            background: #f8f9fa;
            border-radius: 4px;
        }
        #snackbar {
            visibility: hidden;
            min-width: 250px;
            background-color: #333;
            color: #fff;
            text-align: center;
            border-radius: 4px;
            padding: 16px;
            position: fixed;
            z-index: 1;
            left: 50%;
            bottom: 30px;
            transform: translateX(-50%);
        }
        #snackbar.show {
            visibility: visible;
            animation: fadein 0.5s, fadeout 0.5s 2.5s;
        }
        @keyframes fadein {
            from {bottom: 0; opacity: 0;}
            to {bottom: 30px; opacity: 1;}
        }
        @keyframes fadeout {
            from {bottom: 30px; opacity: 1;}
            to {bottom: 0; opacity: 0;}
        }
    </style>
</head>
<body>
<h1>Suppression de votre compte</h1>
<p>Pour supprimer définitivement votre compte <strong>Check-it</strong>, veuillez vous connecter
    avec Google.</p>

</div>

<div id="userInfo">

<div id="snackbar"></div>

        );

        // [Vos fonctions existantes: signInWithGoogle, deleteAccount, etc.]
        document.getElementById('googleSignIn').addEventListener('click', signInWithGoogle);

        async function signInWithGoogle() {
            try {
                const provider = new firebase.auth.GoogleAuthProvider();
                const result = await auth.signInWithPopup(provider);
                showUserInfo(result.user);
                showSnackbar('Connexion réussie', 'success');

    } else {
        document.getElementById('googleSignIn').disabled = true;
        showSnackbar('Ce domaine n\'est pas autorisé pour la connexion', 'error');
        console.error('Domaine non autorisé:', window.location.hostname);
    }

    function showSnackbar(message, type) {
        const snackbar = document.getElementById('snackbar');
        snackbar.textContent = message;
        snackbar.className = 'show ' + type;
        setTimeout(() => snackbar.className = '', 3000);
    }
</script>
</body>
</html>
