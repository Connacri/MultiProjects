<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta content="width=device-width, initial-scale=1.0" name="viewport">
    <title>Merci - My Hospital</title>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css"
          rel="stylesheet">
    <style>
        body {
            font-family: 'Segoe UI', sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background: linear-gradient(135deg, #1976d2 0%, #1565c0 100%);
            color: white;
            text-align: center;
            padding: 20px;
            margin: 0;
        }
        .container {
            max-width: 600px;
        }
        .checkmark {
            font-size: 5rem;
            margin-bottom: 1rem;
            animation: scaleIn 0.5s ease;
        }
        @keyframes scaleIn {
            from {
                transform: scale(0);
            }
            to {
                transform: scale(1);
            }
        }
        h1 {
            font-size: 3rem;
            margin-bottom: 1rem;
            animation: fadeIn 0.8s ease 0.3s both;
        }
        p {
            font-size: 1.2rem;
            margin-bottom: 2rem;
            animation: fadeIn 0.8s ease 0.5s both;
        }
        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
        .btn {
            display: inline-block;
            background-color: #ff9800;
            color: white;
            padding: 15px 40px;
            text-decoration: none;
            border-radius: 50px;
            font-size: 1.1rem;
            transition: all 0.3s;
            animation: fadeIn 0.8s ease 0.7s both;
        }
        .btn:hover {
            background-color: #f57c00;
            transform: translateY(-3px);
            box-shadow: 0 6px 20px rgba(0, 0, 0, 0.3);
        }
        .info {
            margin-top: 2rem;
            font-size: 0.9rem;
            opacity: 0.9;
            animation: fadeIn 0.8s ease 0.9s both;
        }
    </style>
</head>
<body>
<div class="container">
    <div class="checkmark">✓</div>
    <h1>Message envoyé !</h1>
    <p>Merci pour votre message. Nous vous répondrons dans les plus brefs délais à l'adresse email
        que vous avez fournie.</p>
    <a class="btn" href="index.html">Retour à l'accueil</a>
    <div class="info">
        <p><i class="fas fa-clock"></i> Vous serez automatiquement redirigé dans <span
                id="countdown">5</span> secondes...</p>
    </div>
</div>
<script>
    // Compte à rebours
    let seconds = 5;
    const countdownElement = document.getElementById('countdown');

    const interval = setInterval(() => {
        seconds--;
        countdownElement.textContent = seconds;

        if (seconds <= 0) {
            clearInterval(interval);
            window.location.href = 'index.html';
        }
    }, 1000);
</script>
</body>
</html>
